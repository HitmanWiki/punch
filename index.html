            const ref = useRef(null);

                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setInView(true); if (options.once) observer.unobserve(el); }
                    else if (!options.once) setInView(false);
                }, { threshold: options.threshold || 0.1 });
                observer.observe(el);
                return () => observer.disconnect();
            }, []);
            return [ref, inView];

        function TokenomicsSection() { const [ref, inView] = useInView({ once: true }); return (<section id="tokenomics" ref={ref} className="py-24 px-6"><div className="max-w-5xl mx-auto"><div className={`text-center mb-16 transition-all ${inView ? 'opacity-100' : 'opacity-0'}`}><h2 className="font-storybook text-4xl md:text-5xl text-forest-dark mb-4">Tokenomics 📊</h2><p className="font-body text-lg max-w-xl mx-auto">Simple, transparent, community-first</p></div><div className="relative"><div className="relative bg-cream rounded-xl p-8 md:p-12 paper-shadow"><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"><div className="text-center p-4"><div className="w-16 h-16 bg-forest rounded-full flex items-center justify-center mx-auto mb-4 paper-shadow"><span className="text-2xl">🪙</span></div><p className="font-body text-sm mb-1">Total Supply</p><p className="font-storybook text-2xl text-forest-dark mb-1">1,000,000,000</p><p className="font-body text-xs">1 Billion $PUNCH</p></div><div className="text-center p-4"><div className="w-16 h-16 bg-mushroom rounded-full flex items-center justify-center mx-auto mb-4 paper-shadow"><span className="text-2xl">🔒</span></div><p className="font-body text-sm mb-1">Liquidity</p><p className="font-storybook text-2xl text-forest-dark mb-1">✓</p><p className="font-body text-xs">Locked & Burned</p></div><div className="text-center p-4"><div className="w-16 h-16 bg-cardboard rounded-full flex items-center justify-center mx-auto mb-4 paper-shadow"><span className="text-2xl">✨</span></div><p className="font-body text-sm mb-1">Tax</p><p className="font-storybook text-2xl text-forest-dark mb-1">2%</p><p className="font-body text-xs">buy/sell tax</p></div><div className="text-center p-4"><div className="w-16 h-16 bg-sky rounded-full flex items-center justify-center mx-auto mb-4 paper-shadow"><span className="text-2xl">👥</span></div><p className="font-body text-sm mb-1">Ownership</p><p className="font-storybook text-2xl text-forest-dark mb-1">✓</p><p className="font-body text-xs">Renounced</p></div></div><div className="mt-8 pt-6 border-t border-cardboard-light/50 text-center"><p className="font-storybook text-lg text-cardboard-dark italic">"Built for the community, by the community" 🐵💕</p></div></div></div></div></section>); }
        
        // Join Sanctuary Section
        function JoinSanctuarySection() { const [ref, inView] = useInView({ once: true }); return (<section ref={ref} className="py-24 px-6"><div className="max-w-4xl mx-auto"><div className={`text-center mb-16 transition-all ${inView ? 'opacity-100' : 'opacity-0'}`}><h2 className="font-storybook text-4xl md:text-5xl text-forest-dark mb-4">Join the Sanctuary 🌿</h2><p className="font-body text-lg max-w-xl mx-auto">Be part of the coziest community On Bags</p></div><div className="flex flex-col md:flex-row items-center justify-center gap-6"><a href="https://x.com/i/communities/1853720437118947416" target="_blank" className="bg-forest hover:bg-forest-dark rounded-xl p-6 paper-shadow transition-colors w-full md:w-auto"><div className="flex flex-col items-center text-center"><div className="w-14 h-14 bg-cream/20 rounded-full flex items-center justify-center mb-3"><span className="text-2xl">𝕏</span></div><h3 className="font-storybook text-xl text-cream mb-1">X Community</h3><p className="font-body text-sm text-cream/80">Join the community</p></div></a><a href="https://www.tiktok.com/@kosuke.shikano" target="_blank" className="bg-forest hover:bg-forest-dark rounded-xl p-6 paper-shadow transition-colors w-full md:w-auto"><div className="flex flex-col items-center text-center"><div className="w-14 h-14 bg-cream/20 rounded-full flex items-center justify-center mb-3"><span className="text-2xl">🎵</span></div><h3 className="font-storybook text-xl text-cream mb-1">TikTok</h3><p className="font-body text-sm text-cream/80">Follow the zookeeper</p></div></a><a href="https://t.me/PunchOnBags" target="_blank" className="bg-forest hover:bg-forest-dark rounded-xl p-6 paper-shadow transition-colors w-full md:w-auto"><div className="flex flex-col items-center text-center"><div className="w-14 h-14 bg-cream/20 rounded-full flex items-center justify-center mb-3"><span className="text-2xl">✈️</span></div><h3 className="font-storybook text-xl text-cream mb-1">Telegram</h3><p className="font-body text-sm text-cream/80">Join the chat</p></div></a></div></div></section>); }
        
        function ImageCarousel() { const [current, setCurrent] = useState(0); useEffect(() => { const timer = setInterval(() => setCurrent(prev => (prev + 1) % GALLERY.length), 4000); return () => clearInterval(timer); }, []); return (<div className="relative bg-cream p-3 pb-14 rounded-xl paper-shadow"><div className="aspect-square overflow-hidden rounded"><img src={GALLERY[current].src} className="w-full h-full object-cover"/></div><p className="absolute bottom-4 left-0 right-0 text-center text-sm">{GALLERY[current].caption}</p><div className="flex justify-center gap-2 mt-3">{GALLERY.map((_, i) => (<button key={i} onClick={() => setCurrent(i)} className={`w-2 h-2 rounded-full ${i === current ? 'bg-forest w-4' : 'bg-cardinal/40'}`}/>))}</div></div>); }
        
        // Donation Section with Live Fees
        function DonationSection() {
            const [feesData, setFeesData] = useState(null);
            const [tokenData, setTokenData] = useState(null);
            const [error, setError] = useState(null);
            const [animate, setAnimate] = useState(false);
            const prevSolAmount = useRef(null);
            
            const formatUSD = (num) => {
                if (num == null || isNaN(num)) return "—";
                if (num < 0.01) return num.toFixed(6);
                if (num < 1) return num.toFixed(4);
                return num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };
            
            const formatNumber = (num) => {
                if (num == null || isNaN(num)) return "—";
                if (num >= 1000000) return (num / 1000000).toFixed(2) + "M";
                if (num >= 1000) return (num / 1000).toFixed(1) + "K";
                return num.toLocaleString();
            };
            
            useEffect(() => {
                let isMounted = true;
                
                const fetchData = async () => {
                    try {
                        const feesUrl = `https://api2.bags.fm/api/v1/token-launch/lifetime-fees?tokenMint=${CONTRACT_ADDRESS}`;
                        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(feesUrl)}`;
                        const feesResponse = await fetch(proxyUrl);
                        if (!feesResponse.ok) throw new Error(`HTTP ${feesResponse.status}`);
                        const feesDataRaw = await feesResponse.json();
                        
                        if (isMounted && feesDataRaw.success) {
                            const lamports = parseFloat(feesDataRaw.response);
                            const solAmount = lamports / 1000000000;
                            
                            if (prevSolAmount.current !== null && prevSolAmount.current !== solAmount) {
                                setAnimate(true);
                                setTimeout(() => setAnimate(false), 800);
                            }
                            prevSolAmount.current = solAmount;
                            
                            const priceResponse = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd");
                            const priceData = await priceResponse.json();
                            const solPriceUsd = priceData.solana?.usd || 85;
                            const usdAmount = solAmount * solPriceUsd;
                            
                            setFeesData({ usd: usdAmount, sol: solAmount, solPrice: solPriceUsd });
                        }
                        
                        const dexResponse = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CONTRACT_ADDRESS}`);
                        if (dexResponse.ok) {
                            const dexData = await dexResponse.json();
                            if (dexData.pairs && dexData.pairs.length > 0) {
                                const solPair = dexData.pairs.find(p => p.quoteToken?.symbol === "SOL") || dexData.pairs[0];
                                let totalVolume = 0, totalLiquidity = 0;
                                for (const pair of dexData.pairs) {
                                    totalVolume += parseFloat(pair.volume?.h24 || 0);
                                    totalLiquidity += parseFloat(pair.liquidity?.usd || 0);
                                }
                                setTokenData({
                                    marketCap: parseFloat(solPair.marketCap || solPair.fdv || 0),
                                    volume24h: totalVolume,
                                    liquidity: totalLiquidity,
                                    priceChange24h: parseFloat(solPair.priceChange?.h24) || 0
                                });
                            }
                        }
                    } catch (err) {
                        if (isMounted) setError(err.message);
                    }
                };
                
                fetchData();
                const interval = setInterval(fetchData, 21600000);
                return () => { isMounted = false; clearInterval(interval); };
            }, []);
            
            const lastUpdated = new Date();
            
            return (
                <div id="donations" className="relative max-w-3xl mx-auto">
                    <div className="absolute -inset-1 bg-gradient-to-r from-amber-500/30 via-orange-500/30 to-rose-500/30 blur-2xl opacity-60"></div>
                    <div className="relative bg-cream/90 backdrop-blur-xl border border-cardboard/20 p-6 sm:p-10 md:p-14 rounded-2xl paper-shadow">
                        <div className="flex items-center justify-between mb-6 sm:mb-8 pb-5 sm:pb-6 border-b border-cardboard/20 gap-4">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="w-10 h-10 bg-cardboard rounded-full flex items-center justify-center text-cream font-bold">B</div>
                                <div className="min-w-0">
                                    <p className="text-[10px] sm:text-xs tracking-[0.3em] uppercase text-muted-foreground">Powered by</p>
                                    <p className="text-base sm:text-lg font-bold tracking-tight text-forest-dark">Bags<span className="text-mushroom">.fm</span></p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 shrink-0">
                                <span className={`relative flex h-2.5 w-2.5 ${animate ? "scale-125" : ""} transition-transform duration-300`}>
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-mushroom opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-mushroom"></span>
                                </span>
                                <span className="text-[10px] md:text-xs tracking-[0.3em] uppercase text-mushroom font-semibold">Live</span>
                            </div>
                        </div>
                        
                        <p className="text-center text-[10px] sm:text-xs md:text-sm tracking-[0.3em] uppercase text-muted-foreground mb-3 sm:mb-4">
                            Lifetime fees for $PUNCH (100% to Charity)
                        </p>
                        
                        <div className="text-center mb-6 sm:mb-8">
                            <div className="inline-flex items-baseline gap-1 max-w-full">
                                <span className="text-3xl sm:text-4xl md:text-6xl font-bold text-cardboard">$</span>
                                <span className={`text-5xl sm:text-6xl md:text-8xl lg:text-9xl font-bold tracking-tight bg-gradient-to-b from-forest-dark via-forest to-mushroom bg-clip-text text-transparent tabular-nums transition-all duration-500 break-all ${animate ? "scale-[1.02]" : ""}`}>
                                    {feesData?.usd != null ? formatUSD(feesData.usd) : "···"}
                                </span>
                            </div>
                            <div className="mt-3 flex flex-wrap items-center justify-center gap-x-4 gap-y-1 text-xs sm:text-sm text-muted-foreground">
                                <span className="tabular-nums">{feesData?.sol != null ? `${feesData.sol.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} SOL` : "—"}</span>
                                <span className="tracking-wider">@ ${feesData?.solPrice?.toLocaleString() || "—"}</span>
                                <span className="tracking-wider">→ Ichikawa Zoo, Japan</span>
                            </div>
                        </div>
                        
                        {tokenData && (
                            <div className="grid grid-cols-3 gap-2 sm:gap-3 mb-6 sm:mb-8 max-w-xl mx-auto text-center">
                                <div className="border border-cardboard/20 bg-cardboard/5 py-3 px-2 rounded-lg">
                                    <div className="text-[10px] uppercase tracking-widest text-muted-foreground">Market Cap</div>
                                    <div className="text-xs sm:text-sm font-semibold text-forest-dark tabular-nums mt-1">${formatNumber(tokenData.marketCap)}</div>
                                </div>
                                <div className="border border-cardboard/20 bg-cardboard/5 py-3 px-2 rounded-lg">
                                    <div className="text-[10px] uppercase tracking-widest text-muted-foreground">Volume 24h</div>
                                    <div className="text-xs sm:text-sm font-semibold text-forest-dark tabular-nums mt-1">${formatNumber(tokenData.volume24h)}</div>
                                </div>
                                <div className="border border-cardboard/20 bg-cardboard/5 py-3 px-2 rounded-lg">
                                    <div className="text-[10px] uppercase tracking-widest text-muted-foreground">Liquidity</div>
                                    <div className="text-xs sm:text-sm font-semibold text-forest-dark tabular-nums mt-1">${formatNumber(tokenData.liquidity)}</div>
                                </div>
                            </div>
                        )}
                        
                        <div className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                            <a href={`https://bags.fm/${CONTRACT_ADDRESS}`} target="_blank" rel="noopener noreferrer" className="flex-1 px-6 py-4 bg-mushroom text-cream font-semibold tracking-wider uppercase text-sm hover:bg-mushroom/80 transition-colors text-center rounded-full">
                                Support Punch 🐵
                            </a>
                            <a href={`https://bags.fm/${CONTRACT_ADDRESS}`} target="_blank" rel="noopener noreferrer" className="flex-1 px-6 py-4 border border-cardboard/40 text-forest-dark font-semibold tracking-wider uppercase text-sm hover:bg-cardboard/10 transition-colors text-center rounded-full">
                                View on Bags 🔗
                            </a>
                        </div>
                        
                        <p className="text-center text-[10px] sm:text-xs text-muted-foreground mt-6 sm:mt-8 tracking-wide">
                            Live on-chain data via Bags.fm + DexScreener
                            <span> • Updated {lastUpdated.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</span>
                            {error && <span className="text-rose-400/70"> • {error}</span>}
                        </p>
                    </div>
                </div>
            );
        }
        
        // Home Page
        function HomePage() { 
            useEffect(() => { window.scrollTo(0, 0); }, []); 
            return (
                <div className="relative min-h-screen overflow-x-hidden">
                    <CloudBackground />
                    <Navigation />
                    <FloatingBuyButton />
                    <main>
                        <HeroSection />
                        <section id="punch-story" className="relative py-24 px-6"><div className="max-w-4xl mx-auto"><StoryOrigin /><StoryGlobal /><StoryMovement /></div></section>
                        <GallerySection />
                        <HowToBuySection />
                        <TokenomicsSection />
                        <JoinSanctuarySection />
                        <section className="relative py-24 px-6"><DonationSection /></section>
                        <footer className="py-12 px-6 text-center">
                            <div className="max-w-md mx-auto mb-8"><ImageCarousel /></div>
                            <div className="flex items-center justify-center gap-4 mb-6"><div className="h-0.5 w-16 bg-cardboard/50 rounded-full"></div><span className="text-2xl">🐵🧸</span><div className="h-0.5 w-16 bg-cardboard/50 rounded-full"></div></div>
                            <div className="mb-6 inline-flex items-center gap-2 bg-cream/80 rounded-full px-5 py-2.5 paper-shadow"><HeartIcon /><span className="font-body text-sm text-cardboard-dark">All trading fees generated support the Ichikawa Zoo and Punch 🌿</span></div>
                            <p className="font-storybook text-xl text-cardboard-dark mb-4">Made with 💕 for Punch & his plushie</p>
                            <p className="font-body text-sm max-w-xl mx-auto mb-4">$PUNCH is a meme coin On Bags. This is not financial advice. Do your own research before investing.</p>
                            <div className="flex items-center justify-center gap-4 flex-wrap">
                                <a href="https://x.com/i/communities/1853720437118947416" target="_blank" className="text-forest-dark hover:text-mushroom transition-colors">𝕏 Community</a>
                                <a href="https://www.tiktok.com/@kosuke.shikano" target="_blank" className="text-forest-dark hover:text-mushroom transition-colors">🎵 TikTok</a>
                                <a href="https://t.me/PunchOnBags" target="_blank" className="text-forest-dark hover:text-mushroom transition-colors">✈️ Telegram</a>
                                <a href={`https://bags.fm/${CONTRACT_ADDRESS}`} target="_blank" className="text-forest-dark hover:text-mushroom transition-colors">🛍️ Buy on Bags</a>
                            </div>
                            <div className="flex items-center justify-center gap-1 text-sm mt-6"><span>© {new Date().getFullYear()} $PUNCH</span><HeartIcon /><span>All rights reserved</span></div>
                        </footer>
                    </main>
                </div>
            );
        }
        
        // App
        function App() { return (<ToastProvider><HomePage /></ToastProvider>); }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SimpleRouter><App /></SimpleRouter>);
    </script>
</body>
</html>
